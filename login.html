<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ASRP</title>
<meta name="description" content="Login to your ASRP research platform">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
/* ========== VARIABLES (Mint Apple Theme) ========== */
:root {
  --bg: #f0f5f0;
  --surface: #e8f0e8;
  --card: #ffffff;
  --card-alt: #f8faf8;
  --border: #d4e4d4;
  --border-hover: #4a8c6a;
  --text: #2d3b2d;
  --text-secondary: #5a6b5a;
  --text-tertiary: #6b7c6b;
  --accent: #4a8c6a;
  --accent-muted: #3d7559;
  --accent-light: rgba(74, 140, 106, 0.08);
  --success: #4a8c6a;
  --warning: #b89a4a;
  --error: #c45c5c;
  --gradient: linear-gradient(135deg, #7bc4a0, #4a8c6a);
  --shadow: 0 2px 8px rgba(74, 140, 106, 0.08);
  --shadow-hover: 0 4px 16px rgba(74, 140, 106, 0.12);
}

/* ========== RESET ========== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ========== NAVIGATION ========== */
nav {
  width: 100%;
  background: rgba(240, 245, 240, 0.9);
  backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid var(--border);
}

nav .inner {
  max-width: 1120px;
  margin: 0 auto;
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

nav .logo {
  display: flex;
  align-items: center;
  gap: 0.625rem;
  font-size: 1.0625rem;
  font-weight: 600;
  color: var(--text);
}

nav .links {
  display: flex;
  gap: 2rem;
  align-items: center;
  font-size: 0.9375rem;
}

nav .links a {
  color: var(--text-secondary);
  transition: color 0.2s ease;
  text-decoration: none;
}

nav .links a:hover {
  color: var(--text);
}

/* ========== MAIN CONTENT ========== */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem 2rem;
}

.auth-container {
  width: 100%;
  max-width: 440px;
}

.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 3rem;
  box-shadow: var(--shadow-hover);
}

.auth-header {
  text-align: center;
  margin-bottom: 2rem;
}

.auth-header h1 {
  font-size: 1.875rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.auth-header p {
  color: var(--text-secondary);
  font-size: 0.9375rem;
}

/* ========== TABS ========== */
.tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 2rem;
  background: var(--surface);
  border-radius: 10px;
  padding: 4px;
}

.tab {
  flex: 1;
  padding: 0.625rem 1rem;
  border: none;
  background: transparent;
  border-radius: 8px;
  font-size: 0.9375rem;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}

.tab.active {
  background: white;
  color: var(--accent);
  box-shadow: var(--shadow);
}

/* ========== FORM ========== */
.form-group {
  margin-bottom: 1.25rem;
}

label {
  display: block;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.5rem;
}

input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--card-alt);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.9375rem;
  transition: all 0.2s ease;
  font-family: inherit;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}

input::placeholder {
  color: var(--text-tertiary);
}

.checkbox-group {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}

.checkbox-group input[type="checkbox"] {
  width: auto;
  accent-color: var(--accent);
  cursor: pointer;
}

.checkbox-group label {
  margin: 0;
  font-size: 0.875rem;
  font-weight: 400;
  cursor: pointer;
}

/* ========== BUTTON ========== */
.btn {
  width: 100%;
  padding: 0.875rem 1.5rem;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 1rem;
  background: var(--gradient);
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(74, 140, 106, 0.3);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ========== ALERT ========== */
.alert {
  padding: 0.875rem 1rem;
  border-radius: 8px;
  font-size: 0.875rem;
  margin-bottom: 1.25rem;
  display: none;
}

.alert.show {
  display: block;
}

.alert.error {
  background: rgba(200, 92, 92, 0.1);
  border: 1px solid rgba(200, 92, 92, 0.3);
  color: var(--error);
}

.alert.success {
  background: rgba(74, 140, 106, 0.1);
  border: 1px solid rgba(74, 140, 106, 0.3);
  color: var(--success);
}

/* ========== FOOTER ========== */
footer {
  border-top: 1px solid var(--border);
  padding: 2rem 0;
  text-align: center;
  background: var(--card-alt);
}

footer .copyright {
  font-size: 0.875rem;
  color: var(--text-tertiary);
}

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .auth-card {
    padding: 2rem;
  }
}
</style>
</head>
<body>

<!-- NAVIGATION -->
<nav>
  <div class="inner">
    <div class="logo">
      <a href="index.html" style="display:flex;align-items:center;text-decoration:none;color:inherit">
        <img src="logo-nav.png?v=4" alt="ASRP" style="height:40px;vertical-align:middle">
      </a>
    </div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="setup.html">Setup</a>
      <a href="https://github.com/JackZH26/agent-science-research-platform">GitHub</a>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome to ASRP</h1>
        <p id="auth-subtitle">Sign in to continue to your research platform</p>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Alert -->
      <div class="alert" id="alert"></div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="login-remember">
          <label for="login-remember">Remember me</label>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="register-name">Name</label>
          <input type="text" id="register-name" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" placeholder="At least 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="register-confirm">Confirm Password</label>
          <input type="password" id="register-confirm" placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="btn">Create Account</button>
      </form>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <p class="copyright">ASRP — Agent Science Research Platform · Apache 2.0 · Built by <a href="https://jackz.sh" target="_blank" style="color:inherit;text-decoration:underline">Jian Zhou</a></p>
</footer>

<script src="auth.js"></script>
<script>
// Check if already logged in
if (Auth.isLoggedIn()) {
  if (Auth.isSetupComplete()) {
    window.location.href = 'dashboard.html';
  } else {
    window.location.href = 'setup.html';
  }
}

// Switch between login and register tabs
function switchTab(tab) {
  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');
  const subtitle = document.getElementById('auth-subtitle');
  const tabs = document.querySelectorAll('.tab');
  const alert = document.getElementById('alert');

  // Clear alert
  alert.className = 'alert';

  tabs.forEach(t => t.classList.remove('active'));

  if (tab === 'login') {
    loginForm.style.display = 'block';
    registerForm.style.display = 'none';
    subtitle.textContent = 'Sign in to continue to your research platform';
    tabs[0].classList.add('active');
  } else {
    loginForm.style.display = 'none';
    registerForm.style.display = 'block';
    subtitle.textContent = 'Create your ASRP account';
    tabs[1].classList.add('active');
  }
}

// Show alert message
function showAlert(message, type = 'error') {
  const alert = document.getElementById('alert');
  alert.textContent = message;
  alert.className = `alert ${type} show`;
}

// Handle login
function handleLogin(e) {
  e.preventDefault();
  
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const remember = document.getElementById('login-remember').checked;

  const result = Auth.login(email, password, remember);

  if (result.success) {
    // Check if setup is complete
    if (Auth.isSetupComplete()) {
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'setup.html';
    }
  } else {
    showAlert(result.error, 'error');
  }
}

// Handle registration
function handleRegister(e) {
  e.preventDefault();
  
  const name = document.getElementById('register-name').value;
  const email = document.getElementById('register-email').value;
  const password = document.getElementById('register-password').value;
  const confirm = document.getElementById('register-confirm').value;

  // Validate password match
  if (password !== confirm) {
    showAlert('Passwords do not match', 'error');
    return;
  }

  const result = Auth.register(name, email, password);

  if (result.success) {
    showAlert('Account created successfully! Redirecting...', 'success');
    setTimeout(() => {
      window.location.href = 'setup.html';
    }, 1000);
  } else {
    showAlert(result.error, 'error');
  }
}
</script>

</body>
</html>
